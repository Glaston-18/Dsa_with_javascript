  <body>
    <script>
      let arr1 = [
        23, 34, 56, 76, 87, 21, 15, 98, 92, 105, 121, 117, 115, 120, 119, 135,
        127, 129, 128, 130,
      ];

      let sum = 0;
      let avg = 0;

      for (let i = 0; i < arr1.length; i++) {
        sum += arr1[i];
      }
      avg = sum / arr1.length;

      console.log("Average = " + avg);
    </script>
