<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //   let arr1 = [23, 34, 23, -45, -76, 0, 23, 35, 38, 0, 56, 75, 0, 85];
      let arr1 = [1, 2, 1, 3, 2];
      let arr2 = [];
      var count = 0;
      for (let i = 0; i < arr1.length; i++) {
        count = 0;
        for (let j = i + 1; j < arr1.length; j++) {
          if (arr1[i] == arr1[j]) {
            arr2.push(arr1[j]);
            arr1.splice(j, 1);
            j--;
            count += 1;
          }
        }
        console.log("Count of " + arr1[i] + " = " + (count + 1));
      }
    </script>
  </body>
</html>
