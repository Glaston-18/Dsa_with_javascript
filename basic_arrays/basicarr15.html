  <body>
    <script>
      let arr1 = [23, 34, -12, -45, -76, 0, 20, 35, 38, 0, 56, 75, 0, 85];
      let find = 0;
      let lastOccurenceIndex;

      for (let i = 0; i < arr1.length; i++) {
        if (arr1[i] == find) {
          lastOccurenceIndex = i;
          if (i == arr1.length - 1) {
            break;
          }
        }
      }

      console.log("Last occurence = " + lastOccurenceIndex);
    </script>
