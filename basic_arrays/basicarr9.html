<html lang="en">

    <meta charset="UTF-8" />

  <body>
    <script>
      let arr1 = [
        23, 34, 56, 76, 87, 21, 15, 98, 92, 105, 121, 117, 115, 120, 119, 135,
        127, 129, 128, 130,
      ];

      let count = 0;

      for (let i = 0; i < arr1.length; i++) {
        if (arr1[i] % 2 == 0) {
          count += 1;
        }
      }
      console.log("Even Numbers = " + count);
    </script>
  </body>
</html>
