<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let arr1 = [23, 34, -12, -45, -76, 0, 20, 35, 38, 0, 56, 75, 0, 85];

      let positive = 0;
      let negative = 0;
      let zeros = 0;

      for (let i = 0; i < arr1.length; i++) {
        if (arr1[i] > 0) {
          positive += 1;
        } else if (arr1[i] < 0) {
          negative += 1;
        } else {
          zeros += 1;
        }
      }

      console.log(
        "Positive = " +
          positive +
          " Negative = " +
          negative +
          " Zeros = " +
          zeros,
      );
    </script>
  </body>
</html>
